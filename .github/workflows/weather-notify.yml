name: 每日天气推送                                                                                                                                                                                                         
                                                                                                                                                                                                                           
  on:
    schedule:
      - cron: '0 1 * * *'
    workflow_dispatch:                                                                                                                                                                                                       
      inputs:                                                                                                                                                                                                                
        city:                                                                                                                                                                                                                
          description: '出差城市（留空=用默认城市，填城市名如：上海）'                                                                                                                                                       
          required: false                                                                                                                                                                                                    
          default: ''
                                                                                                                                                                                                                             
  jobs:                                                                                                                                                                                                                    
    notify:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
                                                                                                                                                                                                                             
        - uses: actions/setup-python@v5                                                                                                                                                                                      
          with:                                                                                                                                                                                                              
            python-version: '3.12'                                                                                                                                                                                           
                                                                                                                                                                                                                             
        - name: 安装依赖
          run: pip install requests                                                                                                                                                                                          
                                                                                                                                                                                                                             
        - name: 发送天气推送
          env:                                                                                                                                                                                                               
            CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}                                                                                                                                                                        
            SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}                                                                                                                                                                  
            CITY_OVERRIDE: ${{ github.event.inputs.city }}                                                                                                                                                                   
          run: python weather_notify.py
